apiVersion: apps/v1
kind: Deployment
metadata:
  name: ${{ values.name }}
  labels:
    app: ${{ values.name }}
    dxp.io/managed: "true"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ${{ values.name }}
  template:
    metadata:
      labels:
        app: ${{ values.name }}
        backstage.io/kubernetes-id: ${{ values.name }}
    spec:
      nodeSelector:
        role: workload
      tolerations:
      - key: role
        operator: Equal
        value: workload
        effect: NoSchedule
      containers:
      - name: ${{ values.name }}
        image: harbor.dxp/dxp/${{ values.name }}:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8000
        env:
        - name: LITELLM_URL
          value: "http://litellm.llmops.svc.cluster.local:4000"
        - name: LITELLM_API_KEY
          # S61 (Jeudi) : valeur en clair -- pas de mecanisme d'injection de
          # secret par service au provisioning aujourd'hui. Connu, accepte
          # pour la demo (meme niveau de maturite que le reste du POC),
          # a corriger si un vrai mecanisme de secret par service est
          # introduit (cf backlog : cles LiteLLM scopees par projet).
          value: "dxp-LiteLLM2026"
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 200m
            memory: 256Mi
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: ${{ values.name }}
spec:
  selector:
    app: ${{ values.name }}
  ports:
  - port: 80
    targetPort: 8000
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ${{ values.name }}
  labels:
    app: ${{ values.name }}
    dxp.io/managed: "true"
spec:
  ingressClassName: nginx
  rules:
  - host: ${{ values.name }}.68.221.5.247.nip.io
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: ${{ values.name }}
            port:
              number: 80
